# =============================================================================
# Spark — spark-defaults.conf
# Montado em: /opt/bitnami/spark/conf/spark-defaults.conf
#
# Configura o Iceberg REST Catalog e o S3A FileSystem para o MinIO.
# Estas configs são aplicadas automaticamente em todos os jobs submetidos
# ao cluster, dispensando passar --conf manualmente no spark-submit.
#
# Comunicação interna Docker:
#   spark-master/worker  ──►  iceberg-rest:8181 (catálogo)
#   spark-master/worker  ──►  minio:9000         (dados Parquet/ORC)
# =============================================================================

# ---------------------------------------------------------------------------
# Iceberg — Extensions e Catálogos
# ---------------------------------------------------------------------------

# Habilita suporte a comandos SQL do Iceberg (MERGE INTO, ALTER TABLE, etc.)
spark.sql.extensions                                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Catálogo padrão do Spark aponta para o REST Catalog Iceberg
spark.sql.catalog.spark_catalog                         org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type                    rest
spark.sql.catalog.spark_catalog.uri                     http://iceberg-rest:8181
spark.sql.catalog.spark_catalog.warehouse               s3://warehouse/
spark.sql.catalog.spark_catalog.io-impl                 org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.spark_catalog.s3.endpoint             http://minio:9000
spark.sql.catalog.spark_catalog.s3.path-style-access    true

# Catálogo nomeado "iceberg" — use nas queries: SELECT * FROM iceberg.namespace.table
spark.sql.catalog.iceberg                               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type                          rest
spark.sql.catalog.iceberg.uri                           http://iceberg-rest:8181
spark.sql.catalog.iceberg.warehouse                     s3://warehouse/
spark.sql.catalog.iceberg.io-impl                       org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.iceberg.s3.endpoint                   http://minio:9000
spark.sql.catalog.iceberg.s3.path-style-access          true

# ---------------------------------------------------------------------------
# S3A FileSystem — Hadoop (leitura/escrita de arquivos no MinIO)
# Necessário para que o Spark resolva paths "s3a://" corretamente.
# ---------------------------------------------------------------------------

spark.hadoop.fs.s3a.impl                                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint                            http://minio:9000
spark.hadoop.fs.s3a.access.key                          minioadmin
spark.hadoop.fs.s3a.secret.key                          minioadmin
# Path-style: obrigatório para MinIO (evita resolução DNS de subdomínio)
spark.hadoop.fs.s3a.path.style.access                   true
spark.hadoop.fs.s3a.aws.credentials.provider            org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
# Desabilita a verificação de região (MinIO é agnóstico de região)
spark.hadoop.fs.s3a.endpoint.region                     us-east-1
spark.hadoop.fs.s3a.connection.ssl.enabled              false

# ---------------------------------------------------------------------------
# Pacotes Maven — baixados automaticamente no primeiro uso do cluster.
# Em produção, pré-baixe os JARs e monte via volume para evitar latência.
#
# Versões: Iceberg 1.5.2 | Hadoop AWS 3.3.4 | AWS SDK 1.12.262
# ATENÇÃO: hadoop-aws deve ser compatível com a versão do Hadoop embutida
# no Spark. bitnami/spark:3.5 usa Hadoop 3.3.x.
# ---------------------------------------------------------------------------
spark.jars.packages                                     org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262

# ---------------------------------------------------------------------------
# Configurações gerais de performance para ambiente de desenvolvimento
# ---------------------------------------------------------------------------
spark.sql.adaptive.enabled                              true
spark.sql.adaptive.coalescePartitions.enabled           true
spark.serializer                                        org.apache.spark.serializer.KryoSerializer
spark.driver.memory                                     1g
spark.executor.memory                                   1g
