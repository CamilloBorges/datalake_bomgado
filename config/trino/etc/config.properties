# =============================================================================
# Trino — Configuração do nó coordinator
# Neste setup de desenvolvimento, o coordinator também inclui o scheduler
# (node-scheduler.include-coordinator=true). Em produção, separe os roles.
# =============================================================================

coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080

# URI de discovery: aponta para si mesmo (setup single-node)
discovery.uri=http://trino:8080

# Limites básicos de memória para ambiente de desenvolvimento
query.max-memory=2GB
query.max-memory-per-node=1GB
query.max-total-memory-per-node=2GB
