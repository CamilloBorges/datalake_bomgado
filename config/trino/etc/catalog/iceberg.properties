# =============================================================================
# Trino — Catálogo Iceberg
# Arquivo: /etc/trino/catalog/iceberg.properties
#
# Este catálogo usa o Iceberg REST Catalog como fonte de metadados.
# O REST Catalog (iceberg-rest:8181) é o ponto central de verdade para
# schemas e localização dos arquivos no MinIO.
#
# Comunicação interna Docker:
#   trino  ──►  iceberg-rest:8181  ──►  minio:9000
# =============================================================================

connector.name=iceberg

# Tipo de catálogo: REST (Iceberg REST Catalog Spec v1)
iceberg.catalog.type=rest

# Endpoint interno do Iceberg REST Catalog
iceberg.rest-catalog.uri=http://iceberg-rest:8181

# Warehouse base — prefixo onde as tabelas são armazenadas no MinIO
iceberg.rest-catalog.warehouse=s3://warehouse/

# ---------------------------------------------------------------------------
# Filesystem nativo S3 (Trino 390+)
# Substitui o conector Hive S3 legado. Mais performático e sem dependência
# de bibliotecas Hadoop.
# ---------------------------------------------------------------------------
fs.native-s3.enabled=true

# Endpoint MinIO (path-style access obrigatório para MinIO)
s3.endpoint=http://minio:9000
s3.path-style-access=true

# Credenciais MinIO (use secrets em produção)
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin

# Região fictícia — MinIO não valida, mas a SDK exige um valor
s3.region=us-east-1
