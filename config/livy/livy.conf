# =============================================================================
# Apache Livy — livy.conf
# Montado em /opt/livy/conf/livy.conf dentro do container.
#
# Livy atua como REST gateway para o Spark standalone.
# O Airflow remoto submete jobs via POST /batches (LivyOperator),
# recebendo de volta um ID de sessão/batch para fazer polling de status.
# =============================================================================

# --- Spark Master ---
# Cluster standalone interno. O Livy se conecta aqui para lançar drivers.
livy.spark.master = spark://spark-master:7077

# Deploy mode: cluster — o driver roda no worker, não no processo Livy.
# Isso é essencial quando Livy e Spark estão em containers separados.
livy.spark.deployMode = cluster

# --- Servidor ---
livy.server.host = 0.0.0.0
livy.server.port = 8998

# --- Autenticação ---
# Desabilitada para ambiente interno (o Cloudflare Tunnel é a barreira externa).
# Em produção, habilite: livy.server.auth.type = kerberos ou ldap
livy.server.auth.type = None

# --- CORS (permite chamadas do Airflow remoto) ---
livy.server.cors.enabled = true
livy.server.cors.allowedOrigins = *
livy.server.cors.allowedMethods = GET,POST,HEAD,DELETE,OPTIONS
livy.server.cors.allowedHeaders = Content-Type,X-Requested-By

# --- Sessões / Batches ---
# Timeout de sessões interativas ociosas (30 minutos)
livy.server.session.timeout = 1800000

# Máximo de sessões simultâneas (ajuste conforme recursos do worker)
livy.server.sessions.max = 10

# Retenção de logs de batches finalizados
livy.server.yarn.app-lookup-timeout = 120s

# --- Diretório de trabalho ---
# Onde o Livy persiste estado (sessões ativas) entre restarts
livy.server.recovery.mode = recovery
livy.server.recovery.state-store = filesystem
livy.server.recovery.state-store.url = file:///tmp/livy-state

# --- Spark defaults passados para cada job submetido ---
# (Complementados pelo spark-defaults.conf montado via volume)
livy.spark.spark.sql.extensions = org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
livy.spark.spark.sql.catalog.iceberg = org.apache.iceberg.spark.SparkCatalog
livy.spark.spark.sql.catalog.iceberg.type = rest
livy.spark.spark.sql.catalog.iceberg.uri = http://iceberg-rest:8181
livy.spark.spark.sql.catalog.iceberg.warehouse = s3://warehouse/
livy.spark.spark.sql.catalog.iceberg.io-impl = org.apache.iceberg.aws.s3.S3FileIO
livy.spark.spark.sql.catalog.iceberg.s3.endpoint = http://minio:9000
livy.spark.spark.sql.catalog.iceberg.s3.path-style-access = true
livy.spark.spark.hadoop.fs.s3a.endpoint = http://minio:9000
livy.spark.spark.hadoop.fs.s3a.path.style.access = true
